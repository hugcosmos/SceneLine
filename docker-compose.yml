version: '3.8'

services:
  sceneline:
    build: .
    ports:
      - "5000:5000"
    volumes:
      # 数据持久化
      - ./data:/app/data
      - ./sceneline.db:/app/sceneline.db
      # 缓存持久化
      - ./tts-cache:/app/tts-cache
      - ./models:/app/models
      - ./tmp-audio:/app/tmp-audio
      # 日志
      - ./logs:/app/logs
    environment:
      - NODE_ENV=production
      - PORT=5000
    restart: unless-stopped
